<!DOCTYPE html>
<html>
<head>
  <title>Señales Aviator</title>
</head>
<body style="text-align:center; font-family:Arial;">
  <h1>🔥 SEÑALES VIP 🔥</h1>
  <button onclick="generar()">GENERAR SEÑAL</button>
  <h2 id="resultado"></h2>

  <script>
    function generar(){
      let valor = (Math.random()*3 + 1).toFixed(2);
      document.getElementById("resultado").innerText = "Retira en " + valor + "x 🚀";
    }
  </script>
</body>
</html>
